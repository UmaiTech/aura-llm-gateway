name: TypeScript SDK

on:
  push:
    branches: [main]
    paths:
      - 'sdks/typescript/**'
      - '.github/workflows/sdk-typescript.yml'
  pull_request:
    paths:
      - 'sdks/typescript/**'
      - '.github/workflows/sdk-typescript.yml'
  # Publish on the workspace GitHub Release (tag `v*`) created by release-plz,
  # so the TS SDK ships in lockstep with the gateway + Python SDK. The release
  # PR's "Sync SDK versions" step keeps package.json's version aligned.
  release:
    types: [published]
  workflow_dispatch:

defaults:
  run:
    working-directory: sdks/typescript

jobs:
  test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [test]
    # Only on the workspace release (tag v*) created by release-plz. npm
    # rejects re-publishing an existing version, so a release whose version
    # already exists on npm is simply a no-op failure — guarded below.
    if: >-
      github.event_name == 'release' &&
      startsWith(github.event.release.tag_name, 'v')
    environment:
      name: npm
      url: https://www.npmjs.com/package/aura-llm
    permissions:
      id-token: write # OIDC trusted publishing + provenance
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      # Derive the version from the release tag (v1.2.3 -> 1.2.3) and force it
      # into package.json before install/build. The release-PR "Sync SDK
      # versions" step is best-effort and has shipped tags with a stale
      # package.json (e.g. v0.16.0 tagged with 0.1.0); deriving here makes the
      # published version always match the tag, independent of that step.
      - name: Set version from release tag
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Release tag version: ${TAG_VERSION}"
          npm version "${TAG_VERSION}" --no-git-tag-version --allow-same-version
      - run: npm install
      - run: npm run build
      # Trusted publishing (OIDC): npm 11.5+ authenticates via the id-token,
      # no NPM_TOKEN secret. --provenance emits a signed SLSA attestation.
      - run: npm install -g npm@latest
      # Skip (don't fail) if this version is already on npm — mirrors PyPI's
      # skip-existing, so a re-run or an SDK-unchanged release is a no-op.
      - name: Publish to npm (skip if version exists)
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          if npm view "aura-llm@${VERSION}" version >/dev/null 2>&1; then
            echo "aura-llm@${VERSION} already published — skipping."
            exit 0
          fi
          npm publish --provenance --access public
