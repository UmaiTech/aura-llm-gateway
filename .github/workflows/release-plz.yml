name: Release

# This workflow uses release-plz to automate releases.
# IMPORTANT: A Personal Access Token (PAT) or GitHub App token is required
# for the release-pr job. The built-in GITHUB_TOKEN has limitations:
# - Cannot trigger CI workflows on PRs it creates
# - May have issues pushing to protected branches
#
# To set up:
# 1. Create a PAT with 'repo' scope (or a GitHub App with contents:write, pull-requests:write)
# 2. Add it as a repository secret named 'RELEASE_PLZ_TOKEN'
# 3. See: https://release-plz.dev/docs/github/token

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Create a PR with the new versions and changelog, preparing the next release.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    # Only run if RELEASE_PLZ_TOKEN is configured
    if: ${{ vars.RELEASE_PLZ_ENABLED != 'false' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use PAT token for checkout so git push works correctly
          token: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          # Use PAT for GitHub API operations (creating PRs, pushing branches)
          # Falls back to GITHUB_TOKEN but PRs won't trigger CI workflows
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Release unpublished packages (creates GitHub releases, publishes to crates.io).
  # IMPORTANT: Must use PAT so that tags created here trigger build-release workflow.
  # Tags created with GITHUB_TOKEN do NOT trigger other workflows (GitHub security limitation).
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Get current latest tag
        id: before_tag
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Current latest tag: $LATEST_TAG"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          # Must use PAT so tag creation triggers build-release workflow
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Check for new tag
        id: after_tag
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          BEFORE_TAG="${{ steps.before_tag.outputs.tag }}"
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

          if [ "$LATEST_TAG" != "$BEFORE_TAG" ] && [ "$LATEST_TAG" != "none" ]; then
            echo "new_release=true" >> $GITHUB_OUTPUT
            echo "New release created: $LATEST_TAG"
          else
            echo "new_release=false" >> $GITHUB_OUTPUT
            echo "No new release (tag unchanged: $LATEST_TAG)"
          fi

    outputs:
      tag: ${{ steps.after_tag.outputs.tag }}
      new_release: ${{ steps.after_tag.outputs.new_release }}

  # Trigger build-release workflow after a new release is created
  # This ensures binaries are built even if RELEASE_PLZ_TOKEN isn't set
  # (tags created with GITHUB_TOKEN don't trigger other workflows)
  trigger-build:
    name: Trigger Build
    needs: release-plz-release
    if: ${{ needs.release-plz-release.outputs.new_release == 'true' }}
    uses: ./.github/workflows/build-release.yml
    with:
      tag: ${{ needs.release-plz-release.outputs.tag }}
    secrets: inherit
    permissions:
      contents: write
