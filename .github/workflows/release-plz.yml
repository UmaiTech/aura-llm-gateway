name: Release PR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    name: Create Release PR
    runs-on: ubuntu-latest
    # Skip if this is a release commit (tag will be created by create-tag workflow)
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install release-plz
        uses: taiki-e/install-action@v2
        with:
          tool: release-plz

      - name: Check for existing release PR or tag
        id: check
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          TAG="v$VERSION"

          # Check if tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::notice::Tag $TAG already exists, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if there's already an open release PR
          OPEN_PR=$(gh pr list --label release --state open --limit 1 --json number --jq '.[0].number // empty')
          if [ -n "$OPEN_PR" ]; then
            echo "::notice::Release PR #$OPEN_PR already exists"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "skip=false" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run release-plz update
        if: steps.check.outputs.skip != 'true'
        id: update
        run: |
          # Run release-plz update to bump versions and update changelog locally
          release-plz update 2>&1 | tee release-plz-output.txt || true

          # Check if there are any changes
          if git diff --quiet && git diff --cached --quiet; then
            echo "::notice::No changes to release"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT

            # Get the new version
            NEW_VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create release branch and PR
        if: steps.check.outputs.skip != 'true' && steps.update.outputs.has_changes == 'true'
        run: |
          BRANCH_NAME="release-plz-$(date -u +%Y-%m-%dT%H-%M-%SZ)"
          VERSION="${{ steps.update.outputs.version }}"

          # Create and checkout new branch
          git checkout -b "$BRANCH_NAME"

          # Stage all changes
          git add -A

          # Commit
          git commit -m "chore: release v${VERSION}"

          # Push branch
          git push -u origin "$BRANCH_NAME"

          # Create PR with auto-merge
          PR_URL=$(gh pr create \
            --title "chore: release v${VERSION}" \
            --body "## Release v${VERSION}

          This PR was automatically created by release-plz.

          ### Changes
          - Version bump to ${VERSION}
          - Changelog updates

          ---
          *Auto-merge is enabled. This PR will merge automatically once CI passes.*" \
            --label "release" \
            --base main)

          echo "Created PR: $PR_URL"

          # Enable auto-merge
          gh pr merge "$PR_URL" --auto --squash || echo "::warning::Could not enable auto-merge"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old release branches
        if: always()
        run: |
          # Delete merged/closed release-plz branches older than 7 days
          gh pr list --label release --state closed --json headRefName,closedAt \
            | jq -r '.[] | select(.closedAt < (now - 604800)) | .headRefName' \
            | xargs -I {} git push origin --delete {} 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
