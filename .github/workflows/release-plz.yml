name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz-pr:
    name: Create/Update Release PR
    runs-on: ubuntu-latest
    continue-on-error: true
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup git branch
        run: |
          git fetch origin
          git checkout -B main origin/main
          git log -1 --format='%H %s'

      - name: Wait for commit propagation
        run: |
          echo "Waiting for GitHub API to sync commit..."
          sleep 10

          # Verify commit is visible via GitHub API
          COMMIT_SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"

          for i in {1..5}; do
            if gh api "/repos/$REPO/commits/$COMMIT_SHA" &>/dev/null; then
              echo "✓ Commit $COMMIT_SHA is visible via API"
              exit 0
            fi
            echo "Attempt $i: Commit not yet visible, waiting..."
            sleep 5
          done

          echo "⚠ Commit visibility timeout - will retry on next push"
          exit 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz (create PR)
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-release:
    name: Publish Releases
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup git branch
        run: |
          git fetch origin
          git checkout -B main origin/main
          git log -1 --format='%H %s'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz (create tags)
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
