name: Release

# This workflow uses release-plz to automate releases.
# IMPORTANT: A Personal Access Token (PAT) or GitHub App token is required
# for the release-pr job. The built-in GITHUB_TOKEN has limitations:
# - Cannot trigger CI workflows on PRs it creates
# - May have issues pushing to protected branches
#
# To set up:
# 1. Create a PAT with 'repo' scope (or a GitHub App with contents:write, pull-requests:write)
# 2. Add it as a repository secret named 'RELEASE_PLZ_TOKEN'
# 3. See: https://release-plz.dev/docs/github/token

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Create a PR with the new versions and changelog, preparing the next release.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    # Only run if RELEASE_PLZ_TOKEN is configured and NOT a release commit
    if: |
      vars.RELEASE_PLZ_ENABLED != 'false' &&
      !startsWith(github.event.head_commit.message, 'chore: release')
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use PAT token for checkout so git push works correctly
          token: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      # Install release-plz directly (instead of via release-plz/action@v0.5)
      # so we can pass --registry-manifest-path. The action does not expose
      # that flag, which we need because our crates aren't on crates.io —
      # without it, release-plz tries to use crates.io as the comparison
      # baseline, can't find our crates (or finds a stale aura-core@0.8.7),
      # and falls back to "current Cargo.toml version is the baseline".
      # That collapses to "no diff, no bump" the moment a real release tag
      # matches the Cargo.toml version, and the bot stops opening release
      # PRs. Pointing at a worktree of the previous tag fixes the baseline
      # to actual git history. See release-plz issue #1029 / our PR #169.
      - name: Install release-plz binary
        uses: taiki-e/install-action@v2
        with:
          tool: release-plz@0.3.158

      - name: Stage previous release tag as baseline
        id: prev-tag
        run: |
          set -euo pipefail
          # Find the most recent v-prefixed tag. Falls back gracefully:
          # if there's no prior tag (e.g. very first release), we skip
          # the baseline and let release-plz use its default behavior.
          PREV_TAG=$(git tag --list 'v[0-9]*' --sort=-creatordate | head -n1 || true)
          if [ -z "$PREV_TAG" ]; then
            echo "No prior v-tag found; release-plz will use its default baseline"
            echo "have_baseline=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Using prior tag as baseline: $PREV_TAG"
          # Worktree of the previous tag in a sibling directory so the
          # Cargo.toml/Cargo.lock at that revision is available as the
          # comparison source.
          BASELINE_DIR="$(mktemp -d)/release-plz-baseline"
          git worktree add --detach "$BASELINE_DIR" "$PREV_TAG"
          echo "baseline_manifest=$BASELINE_DIR/Cargo.toml" >> "$GITHUB_OUTPUT"
          echo "have_baseline=true" >> "$GITHUB_OUTPUT"

      - name: Configure git for release-plz
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run release-plz
        id: release-plz
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          BASELINE_ARGS=()
          if [ "${{ steps.prev-tag.outputs.have_baseline }}" = "true" ]; then
            BASELINE_ARGS+=(--registry-manifest-path "${{ steps.prev-tag.outputs.baseline_manifest }}")
            echo "Using --registry-manifest-path baseline"
          fi

          release_pr_stderr=$(mktemp)
          if ! release_pr_output=$(release-plz release-pr \
              --git-token "${GITHUB_TOKEN}" \
              --repo-url "https://github.com/${GITHUB_REPOSITORY}" \
              "${BASELINE_ARGS[@]}" \
              -o json 2>"$release_pr_stderr")
          then
            release_pr_error=$(cat "$release_pr_stderr")
            # The release-plz/action used to swallow HTTP 422 silently as
            # {"prs":[]}. We keep that fallback because it can legitimately
            # mean "PR body exceeded GitHub's 65k limit" — preserving the
            # behavior avoids surprising the rest of the pipeline.
            if [[ "$release_pr_error" == *"422"* ]]; then
              echo "::warning::release-plz release-pr failed with HTTP 422; continuing with no PRs created."
              release_pr_output='{"prs":[]}'
            else
              echo "$release_pr_error" >&2
              rm -f "$release_pr_stderr"
              exit 1
            fi
          fi
          rm -f "$release_pr_stderr"

          echo "release_pr_output: $release_pr_output"
          prs=$(echo "$release_pr_output" | jq -c .prs)
          echo "prs=$prs" >> "$GITHUB_OUTPUT"
          prs_length=$(echo "$prs" | jq 'length')
          if [ "$prs_length" != "0" ]; then
            echo "prs_created=true" >> "$GITHUB_OUTPUT"
          else
            echo "prs_created=false" >> "$GITHUB_OUTPUT"
          fi

      # release-plz manages the Rust workspace version but doesn't know about
      # sdks/python/pyproject.toml. Sync it to match the new workspace version
      # so PyPI publishes the right version on the next release tag.
      - name: Sync Python SDK version with workspace
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Find the open release-plz PR (created by the step above)
          PR_NUMBER=$(gh pr list --state open --label release --json number --jq '.[0].number' || echo "")
          if [ -z "$PR_NUMBER" ]; then
            echo "No open release PR found — nothing to sync"
            exit 0
          fi
          PR_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')
          echo "Found release PR #${PR_NUMBER} on branch ${PR_BRANCH}"

          git fetch origin "$PR_BRANCH"
          git checkout "$PR_BRANCH"

          # Read the new workspace version from Cargo.toml
          NEW_VERSION=$(grep -m1 '^version' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')
          CURRENT_PY=$(grep -m1 '^version' sdks/python/pyproject.toml | sed -E 's/version = "([^"]+)"/\1/')
          echo "Workspace: ${NEW_VERSION}, Python SDK currently: ${CURRENT_PY}"

          if [ "$NEW_VERSION" = "$CURRENT_PY" ]; then
            echo "Python SDK version already in sync — no commit needed"
            exit 0
          fi

          # Update pyproject.toml in-place
          sed -i -E "s/^version = \"${CURRENT_PY}\"/version = \"${NEW_VERSION}\"/" sdks/python/pyproject.toml

          git config user.name "Marcus Elwin"
          git config user.email "marcus@elwin.com"
          git add sdks/python/pyproject.toml
          git commit -m "chore: sync Python SDK version to ${NEW_VERSION}"
          git push origin "$PR_BRANCH"

  # Release unpublished packages (creates GitHub releases, publishes to crates.io).
  # IMPORTANT: Must use PAT so that tags created here trigger build-release workflow.
  # Tags created with GITHUB_TOKEN do NOT trigger other workflows (GitHub security limitation).
  # Only runs when a release-plz PR is merged (commit message starts with "chore: release").
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    # Only run when a release PR is merged (commit message pattern from release-plz)
    if: "startsWith(github.event.head_commit.message, 'chore: release')"
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          # Must use PAT so tag creation triggers build-release workflow
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
