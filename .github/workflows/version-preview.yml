name: Version Preview

# Shows what version this PR would create when merged

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  version-preview:
    name: Preview Version Bump
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Fetch the base branch to compare against
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Calculate version bump
        id: version
        run: |
          # Get current version from Cargo.toml
          CURRENT_VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          # Calculate what the next version would be
          NEXT_VERSION=$(git cliff --bumped-version 2>/dev/null || echo "v$CURRENT_VERSION")
          NEXT_VERSION=${NEXT_VERSION#v}  # Remove 'v' prefix if present
          echo "next=$NEXT_VERSION" >> $GITHUB_OUTPUT

          # Determine bump type
          if [ "$CURRENT_VERSION" = "$NEXT_VERSION" ]; then
            echo "bump=none" >> $GITHUB_OUTPUT
          else
            CURRENT_MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
            CURRENT_MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
            CURRENT_PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
            NEXT_MAJOR=$(echo $NEXT_VERSION | cut -d. -f1)
            NEXT_MINOR=$(echo $NEXT_VERSION | cut -d. -f2)
            NEXT_PATCH=$(echo $NEXT_VERSION | cut -d. -f3)

            if [ "$NEXT_MAJOR" != "$CURRENT_MAJOR" ]; then
              echo "bump=major" >> $GITHUB_OUTPUT
            elif [ "$NEXT_MINOR" != "$CURRENT_MINOR" ]; then
              echo "bump=minor" >> $GITHUB_OUTPUT
            else
              echo "bump=patch" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate changelog preview
        id: changelog
        run: |
          # Generate changelog for unreleased changes
          CHANGELOG=$(git cliff --unreleased --strip header 2>/dev/null || echo "No conventional commits detected")

          # Escape for GitHub Actions output
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "content<<$EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const current = '${{ steps.version.outputs.current }}';
            const next = '${{ steps.version.outputs.next }}';
            const bump = '${{ steps.version.outputs.bump }}';
            const changelog = `${{ steps.changelog.outputs.content }}`;

            // Determine emoji based on bump type
            const bumpEmoji = {
              'major': '🚨',
              'minor': '✨',
              'patch': '🔧',
              'none': '➖'
            }[bump] || '❓';

            const bumpLabel = {
              'major': 'MAJOR (breaking changes)',
              'minor': 'MINOR (new features)',
              'patch': 'PATCH (bug fixes)',
              'none': 'No version bump'
            }[bump] || 'Unknown';

            const body = `## ${bumpEmoji} Version Preview

            | Current | → | Next | Bump Type |
            |---------|---|------|-----------|
            | \`v${current}\` | → | \`v${next}\` | **${bumpLabel}** |

            ### Changelog Preview

            <details>
            <summary>Changes that will be included in this release</summary>

            ${changelog || '_No conventional commits detected in this PR_'}

            </details>

            ---
            <sub>Generated by git-cliff based on conventional commits</sub>`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Version Preview')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
