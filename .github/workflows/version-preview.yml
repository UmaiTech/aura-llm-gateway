name: Version Preview

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  version-preview:
    name: Preview Version Bump
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Calculate version bump
        id: version
        run: |
          CURRENT_VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          NEXT_VERSION=$(git cliff --bumped-version 2>/dev/null || echo "v$CURRENT_VERSION")
          NEXT_VERSION=${NEXT_VERSION#v}
          echo "next=$NEXT_VERSION" >> $GITHUB_OUTPUT

          if [ "$CURRENT_VERSION" = "$NEXT_VERSION" ]; then
            echo "bump=none" >> $GITHUB_OUTPUT
          else
            CURRENT_MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
            CURRENT_MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
            NEXT_MAJOR=$(echo $NEXT_VERSION | cut -d. -f1)
            NEXT_MINOR=$(echo $NEXT_VERSION | cut -d. -f2)

            if [ "$NEXT_MAJOR" != "$CURRENT_MAJOR" ]; then
              echo "bump=major" >> $GITHUB_OUTPUT
            elif [ "$NEXT_MINOR" != "$CURRENT_MINOR" ]; then
              echo "bump=minor" >> $GITHUB_OUTPUT
            else
              echo "bump=patch" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate changelog preview
        id: changelog
        run: |
          CHANGELOG=$(git cliff --unreleased --strip header 2>/dev/null || echo "No conventional commits detected")
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "content<<$EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Post version preview comment
        uses: actions/github-script@v7
        env:
          # Pass step outputs through env vars instead of inlining them into the
          # JS script body. Inlining via ${{ ... }} string-substitutes BEFORE the
          # JS parser runs, so any unescaped JS-special characters in the values
          # (backticks, $, quotes, even bare identifiers from commit messages)
          # break the script with "SyntaxError: Unexpected identifier".
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
          NEXT_VERSION: ${{ steps.version.outputs.next }}
          BUMP: ${{ steps.version.outputs.bump }}
          CHANGELOG: ${{ steps.changelog.outputs.content }}
        with:
          script: |
            const current = process.env.CURRENT_VERSION;
            const next = process.env.NEXT_VERSION;
            const bump = process.env.BUMP;
            const changelog = process.env.CHANGELOG || '';

            const bumpEmoji = { 'major': '🚨', 'minor': '✨', 'patch': '🔧', 'none': '➖' }[bump] || '❓';
            const bumpLabel = { 'major': 'MAJOR', 'minor': 'MINOR', 'patch': 'PATCH', 'none': 'No bump' }[bump] || 'Unknown';

            const body = `## ${bumpEmoji} Version Preview

            | Current | → | Next | Type |
            |---------|---|------|------|
            | \`v${current}\` | → | \`v${next}\` | **${bumpLabel}** |

            <details>
            <summary>📋 Changelog preview</summary>

            ${changelog || '_No conventional commits detected_'}

            </details>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('Version Preview'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
