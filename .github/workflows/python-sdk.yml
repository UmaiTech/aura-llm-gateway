name: Python SDK

on:
  push:
    branches: [main, develop]
    paths:
      - 'sdks/python/**'
      - '.github/workflows/python-sdk.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'sdks/python/**'
      - '.github/workflows/python-sdk.yml'
  release:
    types: [published]

defaults:
  run:
    working-directory: sdks/python

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run ruff check
        run: uv run ruff check src/aura tests

      - name: Run ruff format check
        run: uv run ruff format --check src/aura tests

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run mypy
        run: uv run mypy src/aura

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -v

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        run: uv run pytest --cov=aura --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./sdks/python/coverage.xml
          flags: python-sdk
          fail_ci_if_error: false

  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        run: uv build

      - name: Check package
        run: uv tool run twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk-dist
          path: sdks/python/dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build]
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')
    environment:
      name: pypi
      url: https://pypi.org/p/aura-llm
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      # Derive the version from the release tag (v1.2.3 -> 1.2.3) and force it
      # into pyproject.toml before building. The release-PR "Sync SDK versions"
      # step is best-effort and has shipped tags with a stale pyproject (e.g.
      # v0.16.0 tagged with 0.15.0); deriving here makes the published version
      # always match the tag, independent of that step.
      - name: Set version from release tag
        working-directory: sdks/python
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Release tag version: ${TAG_VERSION}"
          sed -i -E "0,/^version = \"[^\"]+\"/s//version = \"${TAG_VERSION}\"/" pyproject.toml
          grep -m1 '^version' pyproject.toml

      - name: Build package
        run: uv build

      - name: Verify package
        run: uv tool run twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist/
          skip-existing: true
