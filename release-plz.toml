# release-plz configuration
# https://release-plz.ieni.dev/docs/config

[workspace]
# Git tag format for releases
git_tag_name = "v{{ version }}"
# Enable creating git tags (required for triggering build workflow)
git_tag_enable = true
# Enable GitHub releases
git_release_enable = true
# Changelog update strategy
changelog_update = true
# Changelog configuration (git-cliff)
changelog_config = "cliff.toml"
# Point every crate at the single workspace-level changelog instead of
# generating one per crate. Per-crate CHANGELOGs in a workspace see every
# commit (git-cliff can't tell which crate a commit belongs to without
# `include_paths`) and end up duplicating the entire repo history under
# every version. One source of truth is cleaner.
changelog_path = "CHANGELOG.md"
# Release name for workspace releases
git_release_name = "Aura LLM Gateway v{{ version }}"

# Allow dirty worktree for release commits
allow_dirty = false

# Semver check disabled (not publishing to crates.io)
semver_check = false

# PR settings
pr_labels = ["release"]
pr_draft = false

# Version bumping: feat commits always bump minor (even in 0.x)
features_always_increment_minor = true

# Individual package configuration.
#
# All four packages share one CHANGELOG.md (via `changelog_path` at the
# workspace level above) — but only `aura-proxy` is allowed to WRITE
# that file. The other three crates have `changelog_update = false`
# so release-plz doesn't append a duplicate `## [vX.Y.Z]` section
# per crate. Without this, every release PR ends up with N copies of
# the same version header (one per workspace crate). See #185.
#
# `aura-proxy` keeps `changelog_update = true` (inherited from
# workspace) AND adds `changelog_include = ["aura-types", "aura-db",
# "aura-core"]` so commits to those crates' files still get
# attributed to the workspace changelog via aura-proxy's writer.
#
# publish = false prevents publishing to crates.io.
# Only aura-proxy creates the actual GitHub release + tag.
[[package]]
name = "aura-types"
publish = false
release = true
git_release_enable = false
git_tag_enable = false
changelog_update = false

[[package]]
name = "aura-db"
publish = false
release = true
git_release_enable = false
git_tag_enable = false
changelog_update = false

[[package]]
name = "aura-core"
publish = false
release = true
git_release_enable = false
git_tag_enable = false
changelog_update = false

[[package]]
name = "aura-proxy"
publish = false
release = true
git_release_enable = true
git_tag_enable = true
# Pull commits attributed to other Rust crates into aura-proxy's
# changelog so the workspace CHANGELOG.md doesn't lose them.
#
# NOTE: this only covers cross-crate Rust commit attribution. Commits
# touching ONLY apps/admin/, apps/landing/, .github/, etc., still
# aren't attributed to any crate and will be dropped from the
# auto-generated entry. When a release PR's CHANGELOG looks short,
# edit it by hand to add the frontend / CI commits before merging —
# documented in CLAUDE.md under "Auto-generated CHANGELOG is incomplete".
changelog_include = ["aura-types", "aura-db", "aura-core"]
