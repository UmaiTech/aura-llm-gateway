# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# The path where the advisory database is cloned/fetched into
db-path = "~/.cargo/advisory-db"
# The url(s) of the advisory databases to use
db-urls = ["https://github.com/rustsec/advisory-db"]

# Ignore advisories for specific IDs. All transitive deps pinned by upstream
# constraints we can't bump (mainly the AWS SDK's aws-lc-rs/rustls 0.21).
# See .cargo/audit.toml for the full rationale per ID. Revisit on dep bumps.
ignore = [
    # RSA timing attack - not applicable as we don't use MySQL
    # Only affects sqlx-mysql which we explicitly disable with default-features = false
    "RUSTSEC-2023-0071",
    # aws-lc-sys 0.37.x — pinned by aws-lc-rs 1.15 (AWS SDK / rustls 0.23).
    "RUSTSEC-2026-0044",
    "RUSTSEC-2026-0045",
    "RUSTSEC-2026-0046",
    "RUSTSEC-2026-0047",
    "RUSTSEC-2026-0048",
    # rustls-webpki 0.101.7 — legacy rustls 0.21 inside the AWS SDK only.
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
    # paste — unmaintained (informational), pinned by utoipa-axum.
    "RUSTSEC-2024-0436",
    # rand 0.8.5 — unsound informational, pinned by sqlx-postgres.
    "RUSTSEC-2026-0097",
]

[licenses]
# Allowed licenses for the project
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"

# Lint level for when a crate version requirement is `*`
wildcards = "allow"

# The graph highlighting used when creating dotgraphs for crates
highlight = "all"

[sources]
# Lint level for what to happen when a crate from a crate registry that is not
# in the allow list is encountered
unknown-registry = "warn"

# Lint level for what to happen when a crate from a git repository that is not
# in the allow list is encountered
unknown-git = "warn"

# List of URLs for allowed crate registries
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
