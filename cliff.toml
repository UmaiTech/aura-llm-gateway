# git-cliff configuration for changelog generation
# https://git-cliff.org/docs/configuration

[bump]
# Configures automatic version bumping based on conventional commits
# https://git-cliff.org/docs/configuration/bump
features_always_bump_minor = true
breaking_always_bump_major = true

# Detect breaking changes in commit body
detect_breaking_from_body = true

# Custom patterns to bump minor (in addition to feat)
# These patterns match significant changes that warrant minor bump
custom_minor_increment_regex = "^(feat|perf|refactor)\\(.+\\)!?:"

# Custom patterns to bump patch
custom_patch_increment_regex = "^(fix|docs|style|test|chore)\\(.+\\)?:"

# Initial version if no tags exist
initial_version = "0.1.0"

[changelog]
# Changelog header
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
# Template for the changelog body
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
# Remove the leading and trailing whitespace from the template
trim = true
# Changelog footer
footer = """
<!-- generated by git-cliff -->
"""

[git]
# Parse conventional commits
conventional_commits = true
# Process each line of a commit as an individual commit
split_commits = false
# Regex for parsing and grouping commits
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^doc", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^style", group = "Styling" },
  { message = "^test", group = "Testing" },
  { message = "^chore\\(release\\): prepare for", skip = true },
  { message = "^chore\\(deps\\)", skip = true },
  { message = "^chore\\(pr\\)", skip = true },
  { message = "^chore\\(pull\\)", skip = true },
  { message = "^chore|^ci", group = "Miscellaneous Tasks" },
  { body = ".*security", group = "Security" },
  { message = "^revert", group = "Revert" },
]
# Protect breaking changes from being skipped
protect_breaking_commits = false
# Filter out commits
filter_commits = true
# Tags to ignore in the changelog
tag_pattern = "v[0-9].*"
# Regex for skipping tags
skip_tags = "v0.1.0-beta.1"
# Sort commits inside sections by oldest/newest order
sort_commits = "oldest"
